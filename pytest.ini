[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -ra
    --strict-markers
    --durations=20
    --durations-min=0.25
markers =
    unit: fast tests with no broad API, runtime, database, or transport integration surface
    integration: tests that exercise API, runtime, storage, gateway, dashboard, or other cross-module boundaries
    e2e: end-to-end or near end-to-end tests that should usually run outside the quick inner loop
    slow: tests known or likely to dominate wall-clock time; excluded by the quick profile
    serial: tests that are safest to keep out of parallel execution
    flaky: tests with known timing or environment sensitivity
